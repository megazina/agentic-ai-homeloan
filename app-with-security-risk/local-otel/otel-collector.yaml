receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 2s
    limit_mib: 256
  batch:
    timeout: 5s
    send_batch_size: 512
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

exporters:
  sapm:
    access_token: "${env:SPLUNK_ACCESS_TOKEN}"
    endpoint: "https://ingest.${env:SPLUNK_REALM}.signalfx.com/v2/trace"
  signalfx:
    access_token: "${env:SPLUNK_ACCESS_TOKEN}"
    realm: "${env:SPLUNK_REALM}"

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [sapm]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [signalfx]
